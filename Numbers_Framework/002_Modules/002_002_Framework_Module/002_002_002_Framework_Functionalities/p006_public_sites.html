    <h2>Public Sites Folders</h2>
    <p>All external applications used by the application needs to be installed into this folder, examples are:</p>
    <ol class="nf_ol_simple">
        <li><b>Python with Flask</b> - for AI chat applications.</li>
        <li><b>Socket IO</b> - NodeJS application for web sockets.</li>

    </ol>
